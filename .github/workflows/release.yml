name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Wymagane dla Trusted Publishing na PyPI

jobs:
  run-tests:
    name: Run Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest mt-940
      - name: Run Tests
        run: pytest

  pypi-publish:
    name: Build and publish to PyPI
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Token nie jest wymagany jeśli skonfigurowano Trusted Publishing w PyPI
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  build-exe:
    name: Build Windows EXE
    needs: run-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . customtkinter pyinstaller mt-940
      - name: Build EXE
        run: python build_exe.py
      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MT940-Converter.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
